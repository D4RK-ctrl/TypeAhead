services:

  postgres:
    image: postgres:16
    container_name: typeahead-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: typeahead

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: typeahead-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: